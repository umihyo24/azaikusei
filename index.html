<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>あざらし育成ゲーム</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --ice: #eef4fb;
      --wave: #1ea3df;
      --text: #334155;
      --soft: #7c8aa0;
      --card: #ffffff;
      --line: #1f2937;
      --btn: #ffffff;
      --btn-hover: #f3f7fc;
      --accent: #ff8fb1;
      --food-glow: rgba(255, 161, 28, 0.24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #e9edf3;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
    }

    .game-shell {
      width: min(92vw, 760px);
      aspect-ratio: 1.15 / 1;
      background: var(--bg);
      border: 3px solid #111827;
      position: relative;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    .top-wave {
      position: absolute;
      inset: 0 0 auto 0;
      height: 160px;
      background: var(--wave);
    }

    .top-wave::after {
      content: "";
      position: absolute;
      left: -6%;
      right: -6%;
      bottom: -32px;
      height: 88px;
      background: var(--bg);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      transform: rotate(-2deg);
    }

    .hud {
      position: absolute;
      top: 16px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 3;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,.2);
    }

    .hud-box {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 12px;
      padding: 8px 12px;
      backdrop-filter: blur(4px);
    }

    .hud-title {
      font-size: 12px;
      opacity: .95;
      margin-bottom: 2px;
    }

    .hud-value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.1;
    }

    .play-area {
      position: absolute;
      inset: 92px 16px 116px 16px;
      overflow: hidden;
    }

    .play-area.is-drop-mode {
      cursor: crosshair;
    }

    .play-area.is-drop-mode::after {
      content: attr(data-drop-label);
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 5;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      border: 2px solid #f3d08b;
      color: #8b5a00;
      font-size: 12px;
      font-weight: 700;
      pointer-events: none;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .status-bubble {
      position: absolute;
      top: 88px;
      left: 20px;
      z-index: 3;
      max-width: 250px;
      background: rgba(255,255,255,0.9);
      border: 2px solid #d5e2f1;
      border-radius: 16px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--soft);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .stats {
      position: absolute;
      left: 20px;
      bottom: 16px;
      z-index: 3;
      width: 210px;
      padding: 12px;
      background: rgba(255,255,255,0.85);
      border-radius: 16px;
      border: 2px solid #d5e2f1;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .stats h2 {
      font-size: 15px;
      margin: 0 0 10px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 56px 1fr 38px;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .bar {
      height: 10px;
      background: #e6edf6;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      transition: width 0.25s ease;
    }

    .bar-hunger span { background: #5cb4ff; }
    .bar-happy span { background: #ff9dbe; }
    .bar-stamina span { background: #8fdc8f; }
    .bar-bond span { background: #b49bff; }
    .bar-weight span { background: #f6b26b; }

    .seal {
      position: absolute;
      width: 148px;
      user-select: none;
      cursor: pointer;
      transform-origin: center bottom;
      transition: transform 0.2s ease, filter 0.2s ease;
      z-index: 1;
      border: none;
      background: transparent;
      padding: 0;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .seal img {
      width: 100%;
      display: block;
      pointer-events: none;
      filter: drop-shadow(0 10px 8px rgba(30, 41, 59, 0.15));
    }

    .seal.is-pet {
      transform: scale(1.06) translateY(-2px);
    }

    .seal.is-sleepy {
      filter: saturate(0.85) brightness(0.95);
    }

    .seal-shadow {
      position: absolute;
      width: 120px;
      height: 18px;
      background: rgba(71, 85, 105, 0.16);
      border-radius: 50%;
      filter: blur(2px);
      z-index: 0;
      pointer-events: none;
    }

    .food-drop {
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 999px;
      display: none;
      place-items: center;
      background: radial-gradient(circle, rgba(255,255,255,0.96) 0%, rgba(255,247,222,0.98) 62%, rgba(247,216,136,0.96) 100%);
      border: 2px dashed #e6a737;
      box-shadow: 0 0 0 12px var(--food-glow), 0 14px 20px rgba(15, 23, 42, 0.10);
      font-size: 30px;
      pointer-events: none;
      z-index: 2;
      animation: foodPulse 1.1s ease-in-out infinite;
    }

    .food-drop.visible {
      display: grid;
    }

    .food-drop::after {
      content: attr(data-label);
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 12px;
      font-weight: 700;
      color: #8b5a00;
      background: rgba(255,255,255,0.94);
      border-radius: 999px;
      padding: 4px 8px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }

    .float-text {
      position: absolute;
      font-size: 18px;
      font-weight: 700;
      color: #ff6fa0;
      text-shadow: 0 1px 0 white;
      animation: floatUp 1s ease forwards;
      pointer-events: none;
      z-index: 4;
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(0) scale(.9); }
      15% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-38px) scale(1.05); }
    }

    @keyframes foodPulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-3px) scale(1.04); }
    }

    .bottom-nav {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      z-index: 4;
    }

    .nav-btn {
      border: 3px solid #1f2937;
      background: var(--btn);
      border-radius: 0;
      font-size: clamp(18px, 2vw, 22px);
      padding: 22px 10px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.08s ease;
    }

    .nav-btn:hover { background: var(--btn-hover); }
    .nav-btn:active { transform: translateY(2px); }

    .panel-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.28);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 10;
    }

    .panel-backdrop.open { display: flex; }

    .panel {
      width: min(100%, 520px);
      background: #fff;
      border-radius: 20px;
      border: 3px solid #d9e4f1;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
      padding: 18px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .panel-header h3 {
      margin: 0;
      font-size: 24px;
    }

    .close-btn {
      border: none;
      background: #eef4fb;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      font-size: 20px;
      cursor: pointer;
    }

    .food-list, .toy-list {
      display: grid;
      gap: 10px;
    }

    .option-card {
      border: 2px solid #d6e3f1;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .option-card h4 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .option-card p {
      margin: 0;
      color: var(--soft);
      font-size: 13px;
      line-height: 1.45;
    }

    .action-btn {
      border: none;
      background: #1ea3df;
      color: white;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-width: 92px;
    }

    .action-btn:disabled {
      background: #aacfe0;
      cursor: not-allowed;
    }

    .settings-grid {
      display: grid;
      gap: 14px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #e6eef6;
    }

    .setting-row:last-child { border-bottom: none; }

    .danger-btn {
      border: none;
      background: #ef4444;
      color: white;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .time-badge {
      position: absolute;
      right: 20px;
      top: 88px;
      z-index: 3;
      background: rgba(255,255,255,0.86);
      border: 2px solid #d5e2f1;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--soft);
    }

    .feature-frame-overlay {
      position: absolute;
      inset: 0;
      z-index: 12;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.34);
      backdrop-filter: blur(4px);
    }

    .feature-frame-overlay.open {
      display: flex;
    }

    .feature-frame {
      width: min(100%, 690px);
      max-height: 100%;
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 16px;
      padding: 18px;
      border-radius: 24px;
      border: 3px solid #d7e7f6;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(243,248,255,0.98) 100%);
      box-shadow: 0 24px 44px rgba(15, 23, 42, 0.18);
    }

    .feature-menu {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-height: 0;
    }

    .feature-menu h3,
    .feature-main h3 {
      margin: 0;
      font-size: 18px;
    }

    .feature-menu-list {
      display: grid;
      gap: 10px;
      align-content: start;
      overflow: auto;
      padding-right: 4px;
    }

    .feature-menu-btn {
      border: 2px solid #d6e3f1;
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      display: grid;
      gap: 6px;
      color: var(--text);
    }

    .feature-menu-btn span {
      font-size: 12px;
      color: var(--soft);
    }

    .feature-menu-btn.is-selected {
      border-color: #7bc7ef;
      background: #e9f7ff;
    }

    .feature-main {
      display: grid;
      gap: 14px;
      min-height: 0;
    }

    .feature-main-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .feature-badge {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e9f7ff;
      color: #2a6a8d;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .feature-main-header p {
      margin: 0;
      color: var(--soft);
      line-height: 1.5;
      font-size: 14px;
    }

    .feature-close-btn {
      border: none;
      background: #eef4fb;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      font-size: 20px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .feature-status {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.84);
      border: 2px solid #dce9f7;
      color: #54708d;
      font-size: 13px;
    }

    .feature-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .feature-content {
      min-height: 170px;
      border-radius: 20px;
      border: 2px dashed #d5e5f4;
      background: #f8fbff;
      padding: 16px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .feature-placeholder {
      text-align: center;
      color: var(--soft);
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .feature-placeholder-icon,
    .feature-minigame-emoji {
      font-size: 40px;
    }

    .feature-result {
      border-radius: 20px;
      border: 2px solid #dce8f4;
      background: rgba(255,255,255,0.9);
      padding: 14px;
      min-height: 120px;
      color: var(--soft);
      font-size: 13px;
    }

    .feature-result-card {
      display: grid;
      gap: 10px;
      color: var(--text);
    }

    .feature-result-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .feature-result-score {
      font-size: 13px;
      color: var(--soft);
    }

    .feature-result-columns {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .feature-result-columns h4 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .feature-result-columns ul {
      margin: 0;
      padding-left: 18px;
    }

    .feature-minigame {
      width: 100%;
      height: 100%;
      display: grid;
      gap: 12px;
      align-content: center;
      justify-items: center;
      text-align: center;
    }

    .feature-minigame-copy,
    .feature-minigame-progress {
      color: var(--soft);
    }

    .feature-progress-bar {
      width: min(100%, 280px);
      height: 14px;
      border-radius: 999px;
      background: #dfeaf7;
      overflow: hidden;
    }

    .feature-progress-bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #7bc7ef, #ff9dbe);
      border-radius: inherit;
    }

    .feature-training-target {
      width: 82px;
      height: 82px;
      border: none;
      border-radius: 999px;
      background: #d7f0ff;
      font-size: 38px;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
    }

    .feature-ice-card {
      width: 100%;
      align-content: stretch;
    }

    .feature-ice-arena {
      position: relative;
      width: 100%;
      min-height: 220px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(200, 234, 255, 0.95) 0%, rgba(239, 248, 255, 0.98) 100%);
      overflow: hidden;
      cursor: none;
    }

    .feature-ice-arena::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 3px solid rgba(79, 143, 196, 0.28);
      border-radius: 24px;
      pointer-events: none;
    }

    .feature-ice-seal {
      position: absolute;
      width: 60px;
      height: 60px;
      display: grid;
      place-items: center;
      font-size: 42px;
      will-change: transform, left, top;
      filter: drop-shadow(0 12px 12px rgba(30, 41, 59, 0.16));
    }
    .night .game-shell,
    .night .game-shell .top-wave {
      transition: background 0.35s ease;
    }

    .night .game-shell {
      background: #edf2fb;
    }

    .night .top-wave {
      background: #3569b8;
    }

    .night .top-wave::before {
      content: "🌙";
      position: absolute;
      right: 34px;
      top: 22px;
      font-size: 30px;
      z-index: 1;
    }

    @media (max-width: 680px) {
      .game-shell {
        width: 96vw;
        aspect-ratio: auto;
        height: 92vh;
      }

      .play-area {
        inset: 92px 10px 128px 10px;
      }

      .stats {
        width: 180px;
      }

      .status-bubble {
        max-width: 180px;
      }

      .bottom-nav {
        gap: 8px;
        left: 10px;
        right: 10px;
      }

      .nav-btn {
        padding: 18px 8px;
        font-size: 18px;
      }

      .feature-frame {
        grid-template-columns: 1fr;
      }

      .feature-result-columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="game-shell" id="gameShell">
    <div class="top-wave"></div>

    <div class="hud">
      <div class="hud-box">
        <div class="hud-title">おさかな</div>
        <div class="hud-value" id="fishValue">30</div>
      </div>
      <div class="hud-box">
        <div class="hud-title">あざらし</div>
        <div class="hud-value" id="stageValue">あかちゃん</div>
      </div>
    </div>

    <div class="status-bubble" id="statusBubble">のんびりしている</div>
    <div class="time-badge" id="timeBadge">ひる</div>

    <div class="play-area" id="playArea">
      <div class="stats">
        <h2>ようす</h2>
        <div class="stat-row">
          <span>まんぷく</span>
          <div class="bar bar-hunger"><span id="hungerBar"></span></div>
          <strong id="hungerValue">70</strong>
        </div>
        <div class="stat-row">
          <span>ごきげん</span>
          <div class="bar bar-happy"><span id="happyBar"></span></div>
          <strong id="happyValue">72</strong>
        </div>
        <div class="stat-row">
          <span>たいりょく</span>
          <div class="bar bar-stamina"><span id="staminaBar"></span></div>
          <strong id="staminaValue">68</strong>
        </div>
        <div class="stat-row">
          <span>なかよし</span>
          <div class="bar bar-bond"><span id="bondBar"></span></div>
          <strong id="bondValue">20</strong>
        </div>
        <div class="stat-row">
          <span>たいじゅう</span>
          <div class="bar bar-weight"><span id="weightBar"></span></div>
          <strong id="weightValue">38</strong>
        </div>
      </div>

      <div class="seal-shadow" id="sealShadow"></div>
      <div class="food-drop" id="actionDrop" aria-hidden="true">🐟</div>
      <button class="seal" id="sealButton" aria-label="あざらしをなでる">
        <img src="seal.png" alt="あざらし" />
      </button>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn" data-panel="food">ごはん 🍚</button>
      <button class="nav-btn" data-panel="toy">おもちゃ ⚽</button>
      <button class="nav-btn" id="openFeatureHubBtn" data-feature-hub="true">ひろば 🎮</button>
      <button class="nav-btn" data-panel="settings">せってい</button>
    </div>

    <div class="panel-backdrop" id="foodPanel">
      <div class="panel">
        <div class="panel-header">
          <h3>ごはん</h3>
          <button class="close-btn" data-close>×</button>
        </div>
        <div class="food-list" id="foodList"></div>
      </div>
    </div>

    <div class="panel-backdrop" id="toyPanel">
      <div class="panel">
        <div class="panel-header">
          <h3>おもちゃ</h3>
          <button class="close-btn" data-close>×</button>
        </div>
        <div class="toy-list" id="toyList"></div>
      </div>
    </div>

    <div class="panel-backdrop" id="settingsPanel">
      <div class="panel">
        <div class="panel-header">
          <h3>せってい</h3>
          <button class="close-btn" data-close>×</button>
        </div>
        <div class="settings-grid">
          <div class="setting-row">
            <div>
              <strong>時間表示</strong>
              <div style="font-size: 13px; color: var(--soft); margin-top: 4px;">昼・夜の表示を切り替える</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="timeToggle" checked />
              表示する
            </label>
          </div>
          <div class="setting-row">
            <div>
              <strong>音量</strong>
              <div style="font-size: 13px; color: var(--soft); margin-top: 4px;">今はUIだけ。あとで音をつなげやすくしてある</div>
            </div>
            <input type="range" min="0" max="100" value="70" id="volumeSlider" />
          </div>
          <div class="setting-row">
            <div>
              <strong>セーブ初期化</strong>
              <div style="font-size: 13px; color: var(--soft); margin-top: 4px;">状態を最初からに戻す</div>
            </div>
            <button class="danger-btn" id="resetBtn">リセット</button>
          </div>
          <div class="setting-row">
            <div>
              <strong>拡張ひろば</strong>
              <div style="font-size: 13px; color: var(--soft); margin-top: 4px;">ミニゲームや軽い独立機能を共通フレームから起動する</div>
            </div>
            <button class="action-btn" id="openFeatureHubFromSettingsBtn">開く</button>
          </div>
        </div>
      </div>
    </div>
